qc_search:
  hela_library: "/share/genome-center/delimp/libraries/hela_library.parquet"
  diann_sif: "/share/genome-center/delimp/diann-2.3.0.sif"
  output_base: "/share/genome-center/delimp/qc_results"
  slurm:
    cpus: 32
    mem_gb: 128
    time_hours: 4
  default_search_params:
    qvalue: 0.01
    max_var_mods: 1
    mbr: true
    rt_profiling: false
    xic: false
    enzyme: "K*,R*"
    missed_cleavages: 1

lc_methods:
  - name: "Evosep 100SPD"
    type: "Evosep"
  - name: "Evosep 60SPD"
    type: "Evosep"
  - name: "Evosep 30SPD"
    type: "Evosep"
  - name: "nanoElute 120min"
    type: "nanoElute"
  - name: "nanoElute 60min"
    type: "nanoElute"

instruments:
  - name: "timsTOF HT"
    type: "timsTOF"
    qc_standard: "HeLa digest"
    thresholds:
      min_proteins: 4000
      min_peptides: 20000
      max_cv: 20
  - name: "timsTOF Ultra"
    type: "timsTOF"
    qc_standard: "HeLa digest"
    thresholds:
      min_proteins: 5000
      min_peptides: 25000
      max_cv: 15
